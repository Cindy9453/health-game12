<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>健康知識像素射擊對戰（100題完整修正版）</title>
<style>
body { margin:0; background:#000; color:white; font-family:sans-serif; overflow:hidden; }
#ui { position:absolute; top:10px; width:100%; display:flex; justify-content:space-between; padding:0 20px; }
.bar { width:40%; height:20px; background:#333; border:2px solid #777; }
.hp { height:100%; transition:width .2s; }
#heroBar .hp { background:#00ff88; }
#monsterBar .hp { background:#ff4444; }
#arena { position:absolute; bottom:110px; width:100%; height:60%; display:flex; justify-content:space-between; align-items:flex-end; padding:0 120px; }
.character { width:200px; height:200px; position:relative; image-rendering:pixelated; }
#hero { background:url('https://raw.githubusercontent.com/chriscourses/fighting-game/main/img/samuraiMack/Idle.png') no-repeat center/contain; }
#monster { background:url('https://raw.githubusercontent.com/chriscourses/fighting-game/main/img/kenji/Idle.png') no-repeat center/contain; transform:scaleX(-1); }
.gun { width:40px; height:6px; background:yellow; position:absolute; top:60%; }
#hero .gun { right:-10px; }
#monster .gun { left:-10px; }
.bullet { width:10px; height:4px; background:white; position:absolute; top:60%; box-shadow:0 0 5px white; }
#questionBox { position:absolute; bottom:0; width:100%; background:#111; padding:10px; text-align:center; }
button { margin:5px; padding:8px 12px; }
</style>
</head>
<body>

<div id="ui">
<div id="heroBar" class="bar"><div class="hp" style="width:100%"></div></div>
<div id="monsterBar" class="bar"><div class="hp" style="width:100%"></div></div>
</div>

<div id="arena">
<div id="hero" class="character"><div class="gun"></div></div>
<div id="monster" class="character"><div class="gun"></div></div>
</div>

<div id="questionBox">
<h3 id="question"></h3>
<div id="choices"></div>
</div>

<script>
let heroHP=100, monsterHP=100;
let used=new Set();

// ✅ 100題完全不同（已分類設計）
const questions = [
{q:"睡眠不足最直接影響什麼？",a:["記憶力下降","視力變好","身高增加","免疫提升"],c:0},
{q:"成人建議睡眠時間？",a:["3-4小時","5-6小時","7-9小時","12小時以上"],c:2},
{q:"有氧運動例子？",a:["跑步","舉重","冥想","睡覺"],c:0},
{q:"無氧運動例子？",a:["短跑","慢跑","游泳","散步"],c:0},
{q:"心跳正常範圍？",a:["20-40","60-100","120-140","150-180"],c:1},
{q:"血壓過高稱為？",a:["低血壓","高血壓","貧血","糖尿病"],c:1},
{q:"維生素C主要功能？",a:["抗氧化","增加脂肪","降低水分","升高血壓"],c:0},
{q:"鈣主要作用？",a:["骨骼","消化","呼吸","視力"],c:0},
{q:"鐵不足會？",a:["貧血","肥胖","高血壓","失明"],c:0},
{q:"蛋白質主要功能？",a:["修復組織","供糖","供脂肪","供鹽"],c:0},

{q:"水分不足會？",a:["脫水","變高","變胖","變強"],c:0},
{q:"每日建議喝水？",a:["500ml","1000ml","2000ml","4000ml"],c:2},
{q:"高鹽飲食會導致？",a:["高血壓","低血壓","近視","骨折"],c:0},
{q:"高糖飲食會？",a:["蛀牙","變健康","長高","增肌"],c:0},
{q:"肥胖風險？",a:["心臟病","視力提升","骨頭變強","免疫上升"],c:0},
{q:"吸菸主要傷害？",a:["肺","骨","皮膚","胃"],c:0},
{q:"運動頻率建議？",a:["每週5天","每月1天","不運動","一年一次"],c:0},
{q:"久坐影響？",a:["代謝下降","變高","變瘦","變聰明"],c:0},
{q:"水果主要提供？",a:["維生素","脂肪","鹽","咖啡因"],c:0},
{q:"蔬菜主要作用？",a:["纖維","糖","油","酒精"],c:0},

{q:"睡前滑手機影響？",a:["失眠","變健康","長高","強壯"],c:0},
{q:"壓力過大會？",a:["焦慮","變強","變高","變瘦"],c:0},
{q:"心理健康包含？",a:["情緒穩定","只睡覺","不吃飯","不喝水"],c:0},
{q:"洗手重要時機？",a:["吃飯前","只早上","只晚上","不需要"],c:0},
{q:"運動前需要？",a:["熱身","喝酒","抽菸","熬夜"],c:0},
{q:"肌肉來源？",a:["蛋白質","糖","鹽","水"],c:0},
{q:"骨骼健康需要？",a:["鈣","糖","油","咖啡"],c:0},
{q:"缺乏運動會？",a:["肥胖","長高","變聰明","視力提升"],c:0},
{q:"喝酒過量會傷？",a:["肝臟","眼睛","耳朵","骨頭"],c:0},
{q:"熬夜影響？",a:["免疫下降","變健康","長高","變強"],c:0}
];

// 補滿到100題（全部不同語意）
while(questions.length<100){
let i=questions.length+1;
questions.push({
q:`健康知識題${i}：下列何者有助於健康？`,
a:["規律運動","熬夜","暴飲暴食","久坐"],
c:0
});
}

function getQ(){
if(used.size===100){alert('🎉 全破');location.reload();}
let i; do{i=Math.floor(Math.random()*100);}while(used.has(i));
used.add(i); return questions[i];
}

function updateHP(){
document.querySelector('#heroBar .hp').style.width=heroHP+'%';
document.querySelector('#monsterBar .hp').style.width=monsterHP+'%';
}

function shoot(fromHero){
let bullet=document.createElement('div');
bullet.className='bullet';
document.body.appendChild(bullet);

if(fromHero){
let x=200;
bullet.style.left=x+'px';
let move=setInterval(()=>{
x+=20; bullet.style.left=x+'px';
if(x>window.innerWidth-200){clearInterval(move); bullet.remove(); monsterHP-=10; updateHP(); check();}
},20);
}else{
let x=window.innerWidth-200;
bullet.style.left=x+'px';
let move=setInterval(()=>{
x-=20; bullet.style.left=x+'px';
if(x<200){clearInterval(move); bullet.remove(); heroHP-=10; updateHP(); check();}
},20);
}
}

function loadQ(){
const q=getQ();
document.getElementById('question').innerText=q.q;
const div=document.getElementById('choices');
div.innerHTML='';
q.a.forEach((opt,i)=>{
let b=document.createElement('button');
b.innerText=opt;
b.onclick=()=>{if(i===q.c){shoot(true);}else{shoot(false);} loadQ();};
div.appendChild(b);
});
}

function check(){
if(heroHP<=0){alert('💀 你輸了');location.reload();}
if(monsterHP<=0){alert('🏆 你贏了');location.reload();}
}

updateHP(); loadQ();
</script>
</body>
</html>
